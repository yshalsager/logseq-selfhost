name: bump-selfhost-sync-ref

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 6'

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    uses: ./.github/workflows/bump-selfhost-upstream-ref-reusable.yml
    with:
      tracked_ref_file: images/sync/UPSTREAM_DB_SYNC_REF
      fetch_mode: path_commit
      upstream_branch: master
      upstream_path: deps/db-sync
      pr_branch: chore/bump-selfhost-sync-ref
      commit_prefix: 'chore: bump db-sync upstream ref to '
      title_prefix: 'chore: bump db-sync upstream ref to '
      body_intro: Automated update of upstream Logseq commit used for db-sync image builds.
      empty_error: Failed to resolve latest db-sync commit SHA from upstream
    secrets: inherit
