name: build-selfhost-image-reusable

on:
  workflow_call:
    inputs:
      image_name:
        description: Image name in GHCR (without owner)
        required: true
        type: string
      dockerfile:
        description: Path to Dockerfile from repository root
        required: true
        type: string
      tracked_ref_file:
        description: Path to pinned upstream ref file from repository root
        required: true
        type: string
      default_logseq_ref:
        description: Fallback upstream ref if tracked file is missing
        required: true
        type: string
      cache_scope:
        description: Cache scope prefix
        required: true
        type: string
      build_timeout_minutes:
        description: Build job timeout in minutes
        required: false
        default: 60
        type: number
      logseq_ref:
        description: Optional override of upstream ref
        required: false
        default: ''
        type: string
      image_tag:
        description: Optional override for published image tag
        required: false
        default: ''
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ inputs.image_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      image_repo: ${{ steps.vars.outputs.image_repo }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
      logseq_ref: ${{ steps.vars.outputs.logseq_ref }}
      publish_latest: ${{ steps.vars.outputs.publish_latest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set vars
        id: vars
        shell: bash
        run: |
          owner='${{ github.repository_owner }}'
          image_repo="ghcr.io/${owner}/${{ inputs.image_name }}"

          tracked_ref=''
          if [[ -f '${{ inputs.tracked_ref_file }}' ]]; then
            tracked_ref="$(tr -d '\r\n' < '${{ inputs.tracked_ref_file }}')"
          fi

          if [[ -n '${{ inputs.logseq_ref }}' ]]; then
            logseq_ref='${{ inputs.logseq_ref }}'
          elif [[ -n "$tracked_ref" ]]; then
            logseq_ref="$tracked_ref"
          else
            logseq_ref='${{ inputs.default_logseq_ref }}'
          fi

          if [[ -n '${{ inputs.image_tag }}' ]]; then
            image_tag='${{ inputs.image_tag }}'
          else
            short_ref="${logseq_ref:0:7}"
            image_tag="$(date +%Y%m%d)-${short_ref}"
          fi

          default_branch='${{ github.event.repository.default_branch }}'
          publish_latest=false
          if [[ '${{ github.ref_name }}' == "$default_branch" ]]; then
            publish_latest=true
          fi

          {
            echo "image_repo=$image_repo"
            echo "image_tag=$image_tag"
            echo "logseq_ref=$logseq_ref"
            echo "publish_latest=$publish_latest"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: meta
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: ${{ inputs.build_timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set build vars
        shell: bash
        run: |
          platform='${{ matrix.platform }}'
          platform_pair="${platform//\//-}"
          echo "PLATFORM_PAIR=${platform_pair}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          platforms: ${{ matrix.platform }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          build-args: |
            LOGSEQ_REF=${{ needs.meta.outputs.logseq_ref }}
          tags: ${{ needs.meta.outputs.image_repo }}
          provenance: false
          sbom: false
          cache-from: |
            type=gha,scope=${{ inputs.cache_scope }}-${{ env.PLATFORM_PAIR }}
            type=registry,ref=${{ needs.meta.outputs.image_repo }}:buildcache-${{ env.PLATFORM_PAIR }}
          cache-to: |
            type=gha,scope=${{ inputs.cache_scope }}-${{ env.PLATFORM_PAIR }},mode=max
            type=registry,ref=${{ needs.meta.outputs.image_repo }}:buildcache-${{ env.PLATFORM_PAIR }},mode=max

      - name: Export digest
        shell: bash
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest='${{ steps.build.outputs.digest }}'
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests
          if-no-files-found: error
          retention-days: 1

  merge:
    needs:
      - meta
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Create manifest list
        shell: bash
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          image='${{ needs.meta.outputs.image_repo }}'
          image_tag='${{ needs.meta.outputs.image_tag }}'

          args=()
          while IFS= read -r digest; do
            if [[ "$digest" =~ ^[0-9a-f]{64}$ ]]; then
              args+=("${image}@sha256:${digest}")
            fi
          done < <(find . -type f -exec basename {} \; | sort -u)

          if [[ "${#args[@]}" -eq 0 ]]; then
            echo 'No digests found' >&2
            exit 1
          fi

          tags=("-t" "${image}:${image_tag}")
          if [[ '${{ needs.meta.outputs.publish_latest }}' == 'true' ]]; then
            tags+=("-t" "${image}:latest")
          fi

          docker buildx imagetools create "${tags[@]}" "${args[@]}"

      - name: Inspect published tags
        shell: bash
        run: |
          image='${{ needs.meta.outputs.image_repo }}'
          image_tag='${{ needs.meta.outputs.image_tag }}'
          docker buildx imagetools inspect "${image}:${image_tag}"
          if [[ '${{ needs.meta.outputs.publish_latest }}' == 'true' ]]; then
            docker buildx imagetools inspect "${image}:latest"
          fi
